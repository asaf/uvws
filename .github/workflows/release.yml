name: Continuous Delivery

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release-core:
    uses: ./.github/workflows/release-package.yml
    with:
      package: core

  release-svc1:
    runs-on: ubuntu-latest
    needs: release-core

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup | Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: chat/pnpm-lock.yaml

      - name: Install | Install Dependencies for UI
        run: |
          cd chat
          pnpm install --frozen-lockfile

      - name: Build | Build UI for svc1
        run: |
          cd chat
          pnpm build
          mv dist ../packages/svc1/static/

      - name: Listing files in package/svc1/static
        run: ls -la ./packages/svc1/static

      # Call the generic release workflow AFTER svc1-specific setup
      - name: Release | Call reusable package workflow
        uses: ./.github/workflows/release-package.yml
        with:
          package: svc1

