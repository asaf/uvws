name: Continuous Delivery

on:
  push:
    branches:
      - main

jobs:
  release-packages:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: "asaf"  
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: write

    strategy:
      matrix:
        package:
          - core
          - svc1

    steps:
      # Note: We checkout the repository at the branch that triggered the workflow
      # with the entire history to ensure to match PSR's release branch detection
      # and history evaluation.
      # However, we forcefully reset the branch to the workflow sha because it is
      # possible that the branch was updated while the workflow was running. This
      # prevents accidentally releasing un-evaluated changes.
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      
      - name: Action | Semantic Version Release (${{ matrix.package }} package)
        id: release_package
        # Adjust tag with desired version if applicable.
        uses: python-semantic-release/python-semantic-release@v9.21.0
        with:
          root_options: "-vv"
          directory: ./packages/${{ matrix.package }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

      - name: Publish | Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release_${{ matrix.package }}.outputs.released == 'true'
        with:
          packages-dir: ./dist
          repository-url: https://firstly-welcome-crane.ngrok-free.app
          user: TODO
          password: TODO

      - name: Publish | Upload to GitHub Release Assets (${{ matrix.package }} package)
        uses: python-semantic-release/publish-action@v9.21.0
        if: steps.release_${{ matrix.package }}.outputs.released == 'true'
        with:
          root_options: "-vv"
          directory: ./packages/${{ matrix.package }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release_package.outputs.tag }}
