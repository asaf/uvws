[project]
name = "svc1"
version = "0.0.7"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Asaf Shakarzy", email = "asaf000@gmail.com" },
]
requires-python = ">=3.13"
dependencies = [
    "core==0.0.15",
    "fastapi>=0.115.11",
    "uvicorn>=0.34.0",
]

[project.scripts]
svc1 = "svc1:main"
server = "svc1.main:start"

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/svc1",
]

[tool.hatch.build.targets.wheel.shared-data]
static = "svc1/static"

[tool.uv.sources.core]
workspace = true

[tool.semantic_release]
build_command = "pip install uv && uv build"
commit_parser = "../../scripts/psr/custom_parser/monorepo_parser.py:ConventionalCommitMonorepoParser"
commit_message = "chore(svc1-release): Release `svc1@{version}` [skip ci]\nAutomatically generated by python-semantic-release\n"
allow_zero_version = true
tag_format = "svc1-{version}"
version_toml = [
    "pyproject.toml:project.version",
]
version_variables = [
    "src/svc1/__init__.py:__version__",
]

[tool.semantic_release.publish]
dist_glob_patterns = [
    "../../dist/svc1-*",
]

[semantic_release.branches.main]
match = "main"
prerelease = false

[semantic_release.branches.beta]
match = "beta"
prerelease = true
prerelease_token = "beta"
